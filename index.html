<!DOCTYPE html>
<html>
<head>
  <title>Geometizer App</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="circle-box">
  <h2>The Geometizer App</h2>

  <p class="text">
    "This program calculates and displays the circumference and area of a circle using the radius, applying the formulas:
    C = 2πr and A = πr² with π approximated as 3.142."
  </p>

  <label>Radius Of A Circle:</label>
  <input type="number" id="radius" placeholder="Enter radius">

  <p id="output"></p>

  <button onclick="calculate()">Calculate</button>
</div>

<script src="app.js"></script>
</body>
</html>
